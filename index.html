<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NY Sports Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; color: #00d4ff; }
    .refresh-btn { background: #00d4ff; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .refresh-btn:hover { background: #00b8e6; transform: scale(1.02); }
    .refresh-btn:disabled { background: #555; cursor: not-allowed; }
    .refresh-btn.loading { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .feeds { display: flex; flex-direction: column; gap: 15px; }
    .feed-card { background: #16213e; border-radius: 12px; padding: 16px; border-left: 4px solid #00d4ff; }
    .feed-card.mets { border-left-color: #ff6600; }
    .feed-card.yankees { border-left-color: #003087; }
    .feed-card.knicks { border-left-color: #006bb6; }
    .feed-card.giants { border-left-color: #0b2265; }
    .feed-card.jets { border-left-color: #125740; }
    .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .feed-title { font-weight: 700; font-size: 1.1rem; }
    .feed-time { font-size: 0.75rem; color: #888; }
    .feed-content { font-size: 0.9rem; line-height: 1.5; }
    .feed-content h3 { color: #00d4ff; margin-bottom: 8px; font-size: 1rem; }
    .feed-content ul { list-style: none; }
    .feed-content li { padding: 4px 0; color: #ccc; }
    .error { background: #3d1a1a; border-left-color: #ff4444; padding: 16px; border-radius: 12px; }
    .last-updated { text-align: center; color: #666; font-size: 0.8rem; margin-top: 20px; }
    .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .loading-overlay.hidden { display: none; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏈 Sports Feeds</h1>
      <button class="refresh-btn" onclick="refreshAll()">🔄 Refresh</button>
    </header>
    
    <div class="feeds" id="feeds">
      <div class="feed-card mets">
        <div class="feed-header">
          <span class="feed-title">🟦 NY Mets</span>
        </div>
        <div class="feed-content" id="mets">Click refresh to load...</div>
      </div>
      
      <div class="feed-card yankees">
        <div class="feed-header">
          <span class="feed-title">🔵 NY Yankees</span>
        </div>
        <div class="feed-content" id="yankees">Click refresh to load...</div>
      </div>
      
      <div class="feed-card knicks">
        <div class="feed-header">
          <span class="feed-title">🟠 NY Knicks</span>
        </div>
        <div class="feed-content" id="knicks">Click refresh to load...</div>
      </div>
    </div>
    
    <div class="last-updated" id="lastUpdated"></div>
  </div>
  
  <div class="loading-overlay hidden" id="loading">
    <div class="spinner"></div>
  </div>

  <script>
    const OBUL_API_KEY = 'd93114be-a50d-478e-89f7-7aecda2bfaa3';
    const PROXY_URL = 'https://proxy.obul.ai/proxy/https/firecrawl.x402endpoints.com/v1/scrape';
    
    const FEEDS = [
      { id: 'mets', name: 'NY Mets', url: 'https://www.espn.com/mlb/team/_/name/nym/new-york-mets' },
      { id: 'yankees', name: 'NY Yankees', url: 'https://www.espn.com/mlb/team/_/name/nyy/new-york-yankees' },
      { id: 'knicks', name: 'NY Knicks', url: 'https://www.espn.com/nba/team/_/name/ny/new-york-knicks' }
    ];
    
    function showLoading(show) {
      document.getElementById('loading').classList.toggle('hidden', !show);
    }
    
    async function fetchFeed(feed) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 25000);
        
        const response = await fetch(PROXY_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-obul-api-key': OBUL_API_KEY
          },
          body: JSON.stringify({
            url: feed.url,
            formats: ['markdown']
          }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        
        if (!data.success) {
          throw new Error(data.error || 'Unknown error from Firecrawl');
        }
        
        return parseFeed(feed.id, data.data.markdown);
      } catch (err) {
        if (err.name === 'AbortError') {
          return '<div class="error">Request timed out. Try again.</div>';
        }
        if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
          return '<div class="error">CORS/Network error: This may be a browser security issue. Try running locally or check console.</div>';
        }
        return `<div class="error">Error: ${err.message}</div>`;
      }
    }
    
    function parseFeed(id, markdown) {
      const headlines = [];
      const lines = markdown.split('\n');
      
      for (const line of lines) {
        if (line.includes('**') && (line.includes('-') || line.includes('h'))) {
          const match = line.match(/\*\*([^*]+)\*\*/);
          if (match && headlines.length < 5) {
            headlines.push(match[1].trim());
          }
        }
      }
      
      if (headlines.length === 0) {
        return '<ul><li>No headlines found</li></ul>';
      }
      
      return '<ul>' + headlines.map(h => `<li>• ${h}</li>`).join('') + '</ul>';
    }
    
    async function refreshAll() {
      const btn = document.querySelector('.refresh-btn');
      btn.disabled = true;
      btn.classList.add('loading');
      showLoading(true);
      
      try {
        const results = await Promise.all(FEEDS.map(feed => fetchFeed(feed)));
        
        FEEDS.forEach((feed, i) => {
          document.getElementById(feed.id).innerHTML = results[i];
        });
        
        document.getElementById('lastUpdated').textContent = 
          'Last updated: ' + new Date().toLocaleTimeString();
      } catch (err) {
        alert('Error refreshing feeds: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        showLoading(false);
      }
    }
  </script>
</body>
</html>
